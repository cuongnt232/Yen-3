name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix text file encodings from Windows upload
        run: |
          python3 <<'PY'
          from pathlib import Path

          def decode_bytes(data: bytes) -> str | None:
              if not data:
                  return ""
              if data.startswith(b"\xff\xfe"):
                  return data.decode("utf-16-le")
              if data.startswith(b"\xfe\xff"):
                  return data.decode("utf-16-be")
              if data.startswith(b"\xef\xbb\xbf"):
                  return data[3:].decode("utf-8")
              # UTF-16 LE without BOM (Windows Notepad): every other byte is null for ASCII
              if len(data) >= 4 and data[1] == 0 and data[3] == 0 and data[0] < 128 and data[2] < 128:
                  try:
                      return data.decode("utf-16-le")
                  except UnicodeDecodeError:
                      pass
              try:
                  return data.decode("utf-8")
              except UnicodeDecodeError:
                  try:
                      return data.decode("utf-16-le")
                  except UnicodeDecodeError:
                      return None

          def fix_file(path: Path) -> bool:
              data = path.read_bytes()
              text = decode_bytes(data)
              if text is None:
                  print(f"SKIP (unknown encoding): {path}")
                  return False
              normalized = text.replace("\r\n", "\n").replace("\r", "\n")
              new_data = normalized.encode("utf-8")
              if new_data != data:
                  path.write_bytes(new_data)
                  print(f"FIXED: {path}")
                  return True
              return False

          fixed = 0
          for pattern in ["*.yml", "*.yaml", "*.swift", "*.m", "*.h", "*.plist", "*.json"]:
              for path in Path(".").rglob(pattern):
                  if ".git" in path.parts:
                      continue
                  if fix_file(path):
                      fixed += 1

          bridging = Path("CellNetMonitor/CellNetMonitor-Bridging-Header.h")
          if bridging.exists():
              content = bridging.read_text(encoding="utf-8")
              if "\x00" in content:
                  raise SystemExit("Bridging header still contains null bytes after encoding fix")
              print(f"Bridging header OK ({len(content.splitlines())} lines)")

          print(f"Encoding fix complete ({fixed} files converted)")
          PY

      - name: Setup Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project on Mac
        run: |
          rm -rf CellNetMonitor.xcodeproj
          xcodegen generate
          xcodebuild -list -project CellNetMonitor.xcodeproj

      - name: Build unsigned app for device
        run: |
          set -euo pipefail
          xcodebuild \
            -project CellNetMonitor.xcodeproj \
            -scheme CellNetMonitor \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build 2>&1 | tee build.log

      - name: Package IPA
        run: |
          set -euo pipefail
          APP_PATH="build/DerivedData/Build/Products/Release-iphoneos/CellNetMonitor.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App not found at $APP_PATH"
            find build -name "*.app" -type d
            exit 1
          fi
          rm -rf dist
          mkdir -p dist/Payload
          cp -R "$APP_PATH" dist/Payload/
          (cd dist && zip -qr CellNetMonitor-unsigned.ipa Payload)
          ls -lh dist/CellNetMonitor-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: CellNetMonitor-ipa
          path: dist/CellNetMonitor-unsigned.ipa
          if-no-files-found: error

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
