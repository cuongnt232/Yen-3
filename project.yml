name: CellNetMonitor
options:
  bundleIdPrefix: com.cellnet
  xcodeVersion: "16.0"
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    TARGETED_DEVICE_FAMILY: "1,2"
    GENERATE_INFOPLIST_FILE: YES
targets:
  CellNetMonitor:
    type: application
    platform: iOS
    sources:
      - path: CellNetMonitor
        excludes:
          - Bridge/Headers
          - Info.plist
          - Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cellnet.monitor
        SWIFT_OBJC_BRIDGING_HEADER: CellNetMonitor/CellNetMonitor-Bridging-Header.h
        HEADER_SEARCH_PATHS: $(SRCROOT)/CellNetMonitor/Bridge $(SRCROOT)/CellNetMonitor/Bridge/Headers
        SWIFT_OBJC_INTERFACE_HEADER_NAME: CellNetMonitor-Swift.h
        SWIFT_STRICT_CONCURRENCY: minimal
        LD_RUNPATH_SEARCH_PATHS: $(inherited) @executable_path/Frameworks
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: CellNet Monitor
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: App can vi tri GPS de hien thi latitude va longitude khi do cell.
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_LSRequiresIPhoneOS: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
    dependencies:
      - sdk: CoreTelephony.framework
      - sdk: CoreLocation.framework
schemes:
  CellNetMonitor:
    build:
      targets:
        CellNetMonitor: all
    run:
      config: Debug
    archive:
      config: Release
